# docker/apache/vhost.conf

ServerName localhost

# Habilitamos los módulos necesarios para que Apache pueda enviar datos a PHP
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so

<VirtualHost *:80>
    # Le decimos a Apache dónde están los archivos (la misma ruta que usará PHP)
    DocumentRoot "/var/www/html"
    DirectoryIndex index.php index.html

    <Directory "/var/www/html">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # LA MAGIA: Todo archivo .php se manda al contenedor llamado "php" al puerto 9000
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>
</VirtualHost> 